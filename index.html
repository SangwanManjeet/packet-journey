<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Journey of a Click — How google.com loads</title>
<style>
  :root{
    --l7:#e84393;--l6:#e17055;--l5:#fdcb6e;--l4:#00b894;--l3:#0984e3;--l2:#6c5ce7;--l1:#74b9ff;
    --bg:#0a0d20;--panel:#161a38;--panel2:#1e2347;--line:#2a3060;--text:#eef1ff;--muted:#9aa3c7;
    --accent:#4c6ef5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(1400px 800px at 50% -10%,#1a2154,var(--bg));
    color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .mono{font-family:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;}

  /* ---------- top progress ---------- */
  .top{display:flex;align-items:center;gap:14px;padding:12px 26px;border-bottom:1px solid var(--line);}
  .top .chip{font-size:12px;color:#cdd3f5;background:var(--panel2);border:1px solid var(--line);padding:5px 12px;border-radius:999px;white-space:nowrap;}
  .segs{display:flex;gap:6px;flex:1;}
  .seg{height:6px;flex:1;border-radius:999px;background:#1d2247;overflow:hidden;}
  .seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#e84393);transition:width .4s;}
  .seg.done .fill{width:100%;}
  .seg.cur .fill{width:50%;}
  .top .count{font-size:12px;color:var(--muted);white-space:nowrap;}

  /* ---------- stage ---------- */
  .stage{flex:1;position:relative;display:flex;flex-direction:column;min-height:0;}
  .scene{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
         padding:24px 40px;min-height:0;animation:fade .5s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .art{flex:1;width:100%;max-width:1200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;}

  /* ---------- narration band ---------- */
  .narr{width:100%;max-width:1040px;text-align:center;}
  .narr .ttl{font-size:30px;font-weight:800;margin:0 0 10px;letter-spacing:.2px;}
  .narr .txt{font-size:18px;line-height:1.55;color:#dfe3ff;margin:0 auto;max-width:860px;}
  .narr .txt b{color:#fff;}
  .narr .hl{color:#ffe08a;}

  /* ---------- node chain ---------- */
  .chain{display:flex;align-items:flex-start;justify-content:center;width:100%;}
  .node{display:flex;flex-direction:column;align-items:center;gap:8px;width:150px;flex:none;transition:.3s;position:relative;}
  .node .av{width:84px;height:84px;border-radius:22px;display:flex;align-items:center;justify-content:center;
            font-size:42px;background:var(--panel2);border:2px solid var(--line);transition:.3s;}
  .node .nm{font-size:14px;font-weight:700;text-align:center;line-height:1.2;}
  .node .nsub{font-size:11.5px;color:var(--muted);text-align:center;}
  .node.dim{opacity:.32;}
  .node.active .av{border-color:#fff;box-shadow:0 0 0 4px #ffffff22,0 0 34px var(--gl,#4c6ef5aa);transform:translateY(-4px) scale(1.06);}
  .node .bubble{
    position:absolute;bottom:108%;left:50%;transform:translateX(-50%);
    background:#fff;color:#11142b;font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:10px;
    white-space:nowrap;box-shadow:0 8px 24px #0007;animation:pop .35s ease;
  }
  .node .bubble::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:#fff;}
  .node .bubble.ans{background:#00b894;color:#063;}
  @keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(6px) scale(.9);}to{opacity:1;}}

  .conn{position:relative;height:6px;flex:1;min-width:46px;margin-top:39px;background:#222a55;border-radius:6px;}
  .conn.active{background:linear-gradient(90deg,#2a3576,#4c6ef5);}
  .conn .beam{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;margin-top:-8px;
    background:#fff;box-shadow:0 0 14px 4px #8ab4ff;display:none;}
  .conn.active .beam{display:block;animation:beamF 1.1s linear infinite;}
  .conn.active.back .beam{animation:beamB 1.1s linear infinite;}
  @keyframes beamF{from{left:-8px;}to{left:calc(100% - 8px);}}
  @keyframes beamB{from{left:calc(100% - 8px);}to{left:-8px;}}
  .conn .tag{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap;}

  /* ---------- title scene browser ---------- */
  .browser{width:min(680px,90%);background:#fff;border-radius:14px;box-shadow:0 30px 70px #000a;overflow:hidden;}
  .browser .bar{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#e9ecf3;}
  .browser .dots{display:flex;gap:6px;}
  .browser .dots i{width:12px;height:12px;border-radius:50%;display:block;}
  .browser .url{flex:1;background:#fff;border-radius:9px;padding:9px 14px;color:#11142b;font-size:16px;text-align:left;
    border:1px solid #d6dbe6;}
  .browser .url .caret{display:inline-block;width:2px;height:18px;background:#11142b;vertical-align:-3px;margin-left:1px;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  .browser .page{height:150px;background:linear-gradient(180deg,#fff,#f4f6fb);display:flex;align-items:center;justify-content:center;color:#9aa3c7;font-size:14px;}

  /* ---------- onion (build / arrival) ---------- */
  .stack-wrap{display:flex;align-items:center;justify-content:center;gap:46px;flex-wrap:wrap;}
  .ring{position:relative;border-radius:16px;padding:30px 16px 16px;border:2px solid;animation:ringpop .45s ease;}
  @keyframes ringpop{from{transform:scale(.85);opacity:0;}to{transform:none;opacity:1;}}
  .ring .tab{position:absolute;top:-1px;left:50%;transform:translate(-50%,-55%);font-size:11px;font-weight:800;color:#0b0e22;
    padding:3px 11px;border-radius:999px;white-space:nowrap;}
  .core{background:#fff;color:#0b0e22;border-radius:10px;padding:14px 18px;font-weight:800;text-align:center;font-size:14px;min-width:150px;}
  .sidecard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;min-width:280px;max-width:340px;}
  .sidecard h4{margin:0 0 4px;font-size:16px;}
  .sidecard .pdu{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .sidecard .frow{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px;}
  .sidecard .frow:last-child{border-bottom:none;}
  .sidecard .frow .k{color:var(--muted);}
  .sidecard .frow .v{font-weight:700;}
  .sidecard .why{margin-top:12px;font-size:13px;color:#cdd3f5;font-style:italic;border-left:3px solid var(--accent);padding-left:11px;}

  /* ---------- LAN / NAT ---------- */
  .nat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px;text-align:left;animation:pop .4s ease;}
  .nat h4{margin:0 0 10px;font-size:15px;}
  .nat .row{display:flex;align-items:center;gap:10px;font-size:14px;margin:6px 0;}
  .nat .from{color:#ff7675;text-decoration:line-through;}
  .nat .to{color:#55efc4;font-weight:700;}
  .wifi{font-size:13px;color:var(--muted);}

  /* ---------- TTL badge ---------- */
  .ttl{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
       border-radius:999px;padding:8px 16px;font-size:14px;}
  .ttl b{font-size:18px;color:#ffe08a;}

  /* ---------- packet pill (travelling label) ---------- */
  .pkt{display:inline-flex;align-items:center;gap:8px;background:#11142b;border:1px solid var(--line);border-radius:10px;
       padding:8px 12px;font-size:13px;}
  .pkt .dotc{width:10px;height:10px;border-radius:50%;background:#8ab4ff;box-shadow:0 0 10px #8ab4ff;}

  /* ---------- TCP/TLS message lane ---------- */
  .lane{position:relative;width:100%;max-width:900px;height:150px;border-radius:16px;border:1px dashed var(--line);background:#0d1130;overflow:hidden;margin:0 auto;}
  .lane .endlabel{position:absolute;top:10px;font-size:13px;color:var(--muted);font-weight:700;}
  .lane .endlabel.l{left:14px;} .lane .endlabel.r{right:14px;}
  .fly{position:absolute;top:56%;transform:translateY(-50%);background:var(--panel2);border:1px solid #5566cc;border-radius:12px;padding:12px 16px;max-width:58%;box-shadow:0 12px 30px #0009;}
  .fly .ml{font-weight:800;font-size:15px;}
  .fly .md{font-size:12px;color:var(--muted);margin-top:4px;}
  .fly.toR{animation:flyR 1s ease both;}
  .fly.toL{animation:flyL 1s ease both;}
  @keyframes flyR{0%{left:3%;opacity:0;}40%{opacity:1;}100%{left:39%;opacity:1;}}
  @keyframes flyL{0%{right:3%;opacity:0;}40%{opacity:1;}100%{right:39%;opacity:1;}}
  .transcript{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .trow{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 11px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted);}
  .trow.cur{border-color:#fff;color:#fff;font-weight:700;}
  .trow.future{opacity:.4;}
  .trow .dir{font-weight:800;color:#8ab4ff;}

  /* ---------- TLS layout + stepper ---------- */
  .tls-wrap{display:flex;gap:34px;align-items:center;justify-content:center;flex-wrap:wrap;width:100%;}
  .tls-main{flex:1 1 460px;max-width:660px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .stepper{display:flex;flex-direction:column;gap:8px;min-width:248px;}
  .st{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--muted);padding:9px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);transition:.2s;}
  .st .stn{width:22px;height:22px;border-radius:50%;background:#2a3168;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;}
  .st.cur{color:#fff;border-color:#fff;transform:translateX(3px);}
  .st.cur .stn{background:var(--accent);}
  .st.done{opacity:.6;} .st.done .stn{background:#00b894;color:#063;}

  /* eavesdropper wire */
  .wire-eve{display:flex;align-items:center;gap:14px;background:#0d1130;border:1px dashed var(--line);border-radius:14px;padding:18px 22px;width:100%;max-width:600px;}
  .wire-eve .big2{font-size:40px;}
  .wire-eve .line{flex:1;height:3px;background:repeating-linear-gradient(90deg,#3a4170 0 10px,transparent 10px 18px);}
  .eve-tag{color:#ff7675;font-weight:700;font-size:12px;}

  /* Diffie–Hellman */
  .dh{display:flex;align-items:stretch;justify-content:center;gap:16px;width:100%;flex-wrap:wrap;}
  .dh-side{flex:1 1 230px;max-width:300px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;text-align:center;}
  .dh-side .who{font-weight:800;font-size:15px;margin-bottom:10px;}
  .blob{border-radius:12px;padding:10px;margin:8px 0;font-size:13px;font-weight:700;}
  .blob.secret{background:#2d1b2e;border:1px solid #ff768555;}
  .blob.pub{background:#13262a;border:1px solid #55efc455;}
  .blob.shared{background:#241b34;border:1px solid #a29bfe;}
  .dh-mid{flex:1 1 170px;max-width:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;background:#160d1a;border:1px dashed #ff768544;border-radius:14px;padding:14px;}
  .dh-math{font-size:13px;color:#cdd3f5;text-align:center;max-width:620px;}
  .dh-result{font-size:15px;background:#241b34;border:1px solid #a29bfe;border-radius:12px;padding:12px 18px;text-align:center;}

  /* certificate chain + keys */
  .certchain{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}
  .cert{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;text-align:center;font-size:13px;min-width:128px;}
  .cert .ci{font-size:26px;}
  .signedby{font-size:11px;color:var(--muted);white-space:nowrap;}
  .keys-vis{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;font-size:14px;}
  .keys-vis .step2{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 18px;text-align:center;}
  .secure-banner{font-size:20px;font-weight:800;background:#10241c;border:1px solid #00b89455;border-radius:14px;padding:22px 30px;text-align:center;color:#55efc4;}

  /* ---------- comparison cards (TCP/UDP, IPv4/6, public/private) ---------- */
  .compare{display:flex;gap:18px;align-items:stretch;justify-content:center;width:100%;flex-wrap:wrap;}
  .ccard{flex:1 1 300px;max-width:390px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;border-top:4px solid;}
  .ccard .ch{display:flex;align-items:center;gap:10px;margin-bottom:3px;}
  .ccard .ch .ci{font-size:26px;}
  .ccard .ch h4{margin:0;font-size:19px;}
  .ccard .csub{color:var(--muted);font-size:12.5px;margin-bottom:12px;}
  .ccard ul{margin:0;padding:0;list-style:none;}
  .ccard li{display:flex;gap:9px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line);align-items:flex-start;}
  .ccard li:last-child{border-bottom:none;}
  .ccard li .mk{flex:none;}
  .ccard .foot{margin-top:12px;font-style:italic;color:#cdd3f5;font-size:12.5px;border-left:3px solid;padding-left:10px;}
  .vs{display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted);font-size:20px;}

  /* IP address anatomy */
  .ipbox{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .octets{display:flex;gap:8px;align-items:center;font-size:32px;font-weight:800;}
  .octet{border-radius:10px;padding:8px 16px;border:2px solid;}
  .octet.net{border-color:#0984e3;color:#74b9ff;background:#0d2030;}
  .octet.host{border-color:#e84393;color:#ff9ff3;background:#2a1322;}

  /* home network diagram */
  .homenet{display:flex;align-items:center;gap:16px;background:#0d1130;border:1px dashed var(--line);border-radius:14px;padding:14px 20px;flex-wrap:wrap;justify-content:center;}
  .homenet .dev{text-align:center;font-size:12px;color:var(--muted);}
  .homenet .dev .di,.homenet .rt .di{font-size:26px;display:block;}
  .homenet .rt{text-align:center;font-size:12px;}
  .homenet .a{color:#3a4170;font-size:20px;}

  /* ---------- NAT before/after table ---------- */
  .nat{max-width:600px;}
  .nattbl{border-collapse:collapse;width:100%;font-size:13px;margin:6px 0 12px;}
  .nattbl th{text-align:left;color:var(--muted);font-weight:600;font-size:10.5px;padding:6px 10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px;}
  .nattbl td{padding:7px 10px;border-bottom:1px dashed var(--line);}
  .nattbl tr.chg td{background:#1d1430;}
  .nattbl tr.chg .to{color:#55efc4;font-weight:700;}
  .nattbl tr.chg .from{color:#ff7675;text-decoration:line-through;}
  .nattbl tr.same td{color:var(--muted);}
  .nattbl small{color:#9aa3c7;}
  .natnote{font-size:12.5px;color:#cdd3f5;}

  /* ---------- MTU / segmentation ---------- */
  .mtu-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
  .bigdata{background:#fff;color:#0b0e22;border-radius:10px;padding:16px 30px;font-weight:800;font-size:16px;box-shadow:0 12px 30px #0008;}
  .splitrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:740px;}
  .pktcell{background:var(--panel);border:1px solid var(--l4);border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;text-align:center;line-height:1.4;opacity:0;transform:scale(.8);animation:pop .4s forwards;}
  .pktcell.more{border-style:dashed;color:var(--muted);border-color:var(--line);}
  .mturuler{font-size:13px;color:var(--muted);background:#0d1130;border:1px dashed var(--line);border-radius:10px;padding:11px 18px;text-align:center;max-width:660px;line-height:1.7;}
  .mturuler b{color:#ffe08a;}

  /* ---------- optical fibre ---------- */
  .fiber{position:relative;width:92%;max-width:700px;height:92px;border-radius:46px;
         background:linear-gradient(180deg,#0d2030,#0a1626);border:2px solid #1b3a4a;overflow:hidden;box-shadow:inset 0 0 30px #000;}
  .fiber .core{position:absolute;top:50%;left:0;right:0;height:34px;transform:translateY(-50%);
         background:linear-gradient(180deg,rgba(116,185,255,.04),rgba(116,185,255,.14),rgba(116,185,255,.04));}
  .fiber .pulse{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:#adcbff;box-shadow:0 0 20px 7px #74b9ff;transform:translateY(-50%);animation:fiberflow 2.4s linear infinite;}
  @keyframes fiberflow{from{left:-24px;}to{left:calc(100% + 24px);}}
  .infocard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;max-width:232px;text-align:center;}
  .infocard .ic{font-size:26px;}
  .infocard .it{font-weight:700;font-size:13.5px;margin:4px 0;}
  .infocard .ix{font-size:12px;color:var(--muted);line-height:1.5;}

  /* ---------- bandwidth pipes ---------- */
  .pipes{display:flex;flex-direction:column;gap:16px;width:92%;max-width:700px;}
  .pipe-row{display:flex;align-items:center;gap:14px;}
  .pipelabel{width:120px;text-align:right;font-size:13px;font-weight:700;flex:none;}
  .pipelabel small{color:var(--muted);font-weight:400;}
  .pipe{flex:1;position:relative;border-radius:999px;background:#0d1130;border:1px solid var(--line);overflow:hidden;}
  .pipe.narrow{height:18px;}
  .pipe.wide{height:46px;}
  .dotp{position:absolute;width:11px;height:11px;border-radius:50%;background:#55efc4;
        box-shadow:0 0 8px #55efc4;transform:translateY(-50%);animation:fiberflow 1.9s linear infinite;}

  /* ---------- cellular generations ---------- */
  .gens{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%;}
  .gen{flex:1 1 150px;max-width:215px;background:var(--panel);border:1px solid var(--line);border-top:4px solid;border-radius:14px;padding:14px;text-align:center;}
  .gen .gg{font-size:24px;font-weight:800;}
  .gen .gy{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .gbarwrap{height:8px;background:#20254a;border-radius:999px;overflow:hidden;margin:8px 0;}
  .gbar{height:100%;border-radius:999px;animation:grow 1s ease;}
  @keyframes grow{from{width:0;}}
  .gen .gs{font-weight:700;font-size:13px;}
  .gen .gu{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5;}

  /* ---------- encryption ---------- */
  .plainbox{background:#2a1322;border:1px solid #e8439355;border-radius:12px;padding:14px 18px;font-weight:700;text-align:center;}
  .cipherbox{background:#10241c;border:1px solid #00b89455;border-radius:12px;padding:14px 18px;font-weight:700;text-align:center;color:#55efc4;}
  .plainbox small,.cipherbox small{display:block;font-weight:400;color:var(--muted);margin-top:4px;font-size:11px;}
  .hybridnote{background:#160d1a;border:1px dashed #a29bfe55;border-radius:12px;padding:12px 18px;text-align:center;font-size:13.5px;color:#cdd3f5;max-width:680px;}
  .hashdemo{display:flex;flex-direction:column;gap:12px;width:100%;max-width:760px;}
  .hrow{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;font-size:14px;}
  .hin{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-weight:700;}
  .hfn{background:#1d1430;border:1px solid #a29bfe55;border-radius:8px;padding:6px 12px;font-size:12px;color:#a29bfe;}
  .hout{background:#0d1130;border:1px solid var(--line);border-radius:8px;padding:6px 12px;color:#74b9ff;font-size:12.5px;}
  .algogrid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%;}
  .algocard{flex:1 1 200px;max-width:255px;background:var(--panel);border:1px solid var(--line);border-left:4px solid;border-radius:12px;padding:13px 15px;text-align:left;}
  .algocard .an{font-size:17px;font-weight:800;}
  .algocard .at{display:inline-block;font-size:10.5px;padding:2px 9px;border-radius:999px;margin:5px 0;color:#0b0e22;font-weight:700;}
  .algocard .asz{font-size:11px;color:var(--muted);}
  .algocard .au{font-size:12px;color:#cdd3f5;margin-top:7px;line-height:1.5;}

  /* ---------- home / landing ---------- */
  #home{flex:1;overflow:auto;display:none;flex-direction:column;}
  body.on-home #home{display:flex;}
  body.on-home .top, body.on-home .stage, body.on-home .nav{display:none;}
  .home-inner{max-width:1140px;margin:0 auto;padding:46px 24px 54px;width:100%;}
  .hero{text-align:center;margin-bottom:36px;}
  .hero h1{font-size:40px;margin:0 0 14px;letter-spacing:.2px;}
  .hero p{color:var(--muted);font-size:17px;max-width:730px;margin:0 auto 24px;line-height:1.6;}
  .hero p b{color:#fff;}
  .btn.big{font-size:17px;padding:14px 34px;}

<script>
/* =====================================================================
   Layer palette + the request that travels
   ===================================================================== */
const COL={7:'--l7',6:'--l6',5:'--l5',4:'--l4',3:'--l3',2:'--l2',1:'--l1'};
const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const colorN=n=>css(COL[n]);

const PAYLOAD='GET google.com';
const SERVER_IP='142.250.190.78';
const MY_IP='192.168.1.5';
const PUBLIC_IP='49.36.144.10';
const GATEWAY='192.168.1.1';

/* encapsulation layer details (used by BUILD + ARRIVAL scenes) */
const LYR={
  7:{tag:'HTTP',name:'Application',pdu:'Data',
     fields:[['Method','GET'],['Path','/'],['Host','google.com']],
     why:'The actual message your browser wants to send.'},
  6:{tag:'TLS',name:'Presentation',pdu:'Data',
     fields:[['Protocol','TLS 1.3'],['Cipher','AES-GCM'],['Payload','🔒 encrypted']],
     why:'Encrypts it so nobody on the way can read it.'},
  5:{tag:'SESS',name:'Session',pdu:'Data',
     fields:[['Session','0xA17C'],['State','ESTABLISHED']],
     why:'Remembers this is one ongoing conversation.'},
  4:{tag:'TCP',name:'Transport',pdu:'Segment',
     fields:[['Src Port','51000'],['Dst Port','443'],['Flag','SYN'],['Seq #','1029384756']],
     why:'Adds ports + guarantees reliable, in-order delivery.'},
  3:{tag:'IP',name:'Network',pdu:'Packet',
     fields:[['Src IP',MY_IP],['Dst IP',SERVER_IP],['TTL','64'],['Proto','6 (TCP)']],
     why:'Stamps the source & destination IP so routers can forward it.'},
  2:{tag:'ETH',name:'Data Link',pdu:'Frame',
     fields:[['Src MAC','AA:BB:CC:11:22:33'],['Dst MAC','5C:F9:38:AB:CD:01'],['Type','0x0800']],
     why:'Adds hardware (MAC) addresses for the next hop on the local link.'},
  1:{tag:'BITS',name:'Physical',pdu:'Bits',
     fields:[['Medium','Wi-Fi radio'],['Encoding','OFDM'],['Preamble','10101010…']],
     why:'Turns the whole frame into 1s and 0s on the air.'},
};

/* =====================================================================
   THE STORY  — a flat list of user-paced beats
   ===================================================================== */
const BEATS=[
  {ch:'1 · The Click', scene:'title', ttl:'You open <span class="hl">google.com</span>',
   txt:'You type four letters and hit Enter. In the next ~100 milliseconds, your request will be wrapped in five layers of headers, find Google’s address through a chain of servers, hop across your home, your city, and the internet backbone — and come back with a web page. Let’s follow it, one step at a time.'},

  /* ---- DNS ---- */
  {ch:'2 · Finding Google', scene:'dns', sub:0, ttl:'“Where <i>is</i> google.com?”',
   txt:'Computers don’t route to names — they route to <b>numbers (IP addresses)</b>. Before anything can be sent, your computer must translate <b>google.com</b> into an IP. This translation is called <b>DNS</b> (the internet’s phone book).'},
  {ch:'2 · Finding Google', scene:'dns', sub:1, ttl:'First, check your own memory',
   txt:'Your computer checks its <b>local DNS cache</b> — maybe it looked up Google recently. This time it’s a <span class="hl">miss</span>. So it has to go ask someone who knows.'},
  {ch:'2 · Finding Google', scene:'dns', sub:2, ttl:'Ask the resolver',
   txt:'It sends the question to a <b>recursive resolver</b> (here, <b>8.8.8.8</b>) — usually run by your ISP or a public provider. The resolver’s job: do the legwork and come back with an answer.'},
  {ch:'2 · Finding Google', scene:'dns', sub:3, ttl:'Step 1: ask a Root server',
   txt:'The resolver asks a <b>Root server</b>: “where do I find <b>.com</b>?” The root doesn’t know Google, but it knows who runs <b>.com</b> and replies: <span class="hl">“Ask the .com servers.”</span>'},
  {ch:'2 · Finding Google', scene:'dns', sub:4, ttl:'Step 2: ask the .com servers',
   txt:'Next the resolver asks the <b>.com TLD server</b>: “where’s <b>google.com</b>?” It replies with the address of Google’s own name servers: <span class="hl">“Ask Google’s nameserver.”</span>'},
  {ch:'2 · Finding Google', scene:'dns', sub:5, ttl:'Step 3: Google’s nameserver answers',
   txt:'Finally the resolver asks <b>Google’s authoritative nameserver</b>, which knows for sure: <span class="hl">google.com = '+SERVER_IP+'</span>.'},
  {ch:'2 · Finding Google', scene:'dns', sub:6, ttl:'The address comes back to you',
   txt:'The resolver hands the IP back to your computer (and caches it for next time). 🎉 <b>Now we know where to send the request:</b> <span class="hl">'+SERVER_IP+'</span>.'},

  /* ---- TCP 3-way handshake ---- */
  {ch:'3 · The Connection', scene:'tcp', sub:0, ttl:'Knock knock — open a connection',
   txt:'Before any secure data flows, the two machines open a reliable channel with the <b>TCP 3-way handshake</b>. Your computer sends a <b>SYN</b> (“let’s synchronise”) carrying a starting sequence number.'},
  {ch:'3 · The Connection', scene:'tcp', sub:1, ttl:'Google answers',
   txt:'Google replies with <b>SYN-ACK</b>: it acknowledges your number and sends its own. Both sides now know each other’s starting points.'},
  {ch:'3 · The Connection', scene:'tcp', sub:2, ttl:'Connection established',
   txt:'Your computer sends a final <b>ACK</b>. ✅ A reliable, ordered channel is open — the foundation the <b>TLS</b> security handshake will build on.'},

  /* ---- TLS handshake ---- */
  {ch:'4 · The Secret Handshake', scene:'tls', sub:0, ttl:'The problem: a wire everyone can read',
   txt:'Your data crosses routers and cables owned by strangers. To stay private it must be <b>encrypted</b> — but symmetric encryption needs <b>both sides to share the same secret key</b>. How do you agree on a secret while the whole world is watching? Enter the <b>TLS handshake</b>.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:1, ttl:'ClientHello',
   txt:'Your browser says hello and offers: the <b>cipher suites</b> it supports, a fresh <b>random number</b>, and its <b>key share</b> — a public value <b class="mono">gᵃ</b> derived from a secret <b class="mono">a</b> that only your browser knows.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:2, ttl:'ServerHello',
   txt:'Google picks a cipher (<b>AES-256-GCM</b>), sends its own <b>random</b> and its <b>key share</b> <b class="mono">gᵇ</b>. Now each side holds the other’s public key share — the ingredients for a shared secret.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:3, ttl:'Sharing a secret in plain sight 🪄',
   txt:'This is the magic: <b>Diffie–Hellman key exchange</b>. Each side mixes the other’s public share with its own private secret and lands on the <b>same shared secret</b> <b class="mono">gᵃᵇ</b> — which was <b>never sent</b>. An eavesdropper sees both public shares but can’t reverse them to get the secret.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:4, ttl:'Turn the secret into keys',
   txt:'The shared secret is run through a <b>key-derivation function (HKDF)</b> to produce the real <b>symmetric session keys</b>. From here, fast AES-GCM protects every byte — and the keys themselves never travel the wire.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:5, ttl:'But is it really Google?',
   txt:'A shared key is worthless if you handed it to an impostor. Google presents a <b>certificate</b> signed by a <b>Certificate Authority</b>. Your browser verifies the signature chain up to a <b>trusted Root CA</b>, and <b>CertificateVerify</b> proves Google owns the matching private key — blocking man-in-the-middle attacks.'},
  {ch:'4 · The Secret Handshake', scene:'tls', sub:6, ttl:'🔒 Secure channel ready',
   txt:'Both sides send an encrypted <b>Finished</b> message covering the whole handshake, confirming nothing was tampered with. The secure tunnel is open — <b>now</b> the real request can travel, fully encrypted.'},

  /* ---- Encryption, explained ---- */
  {ch:'5 · Encryption, Explained', scene:'encwhy', ttl:'Why encrypt at all?',
   txt:'Everything you send hops across routers and cables owned by strangers — we even saw an eavesdropper sitting on the wire. <b>Encryption</b> scrambles your data so only the intended party can make sense of it, protecting three things: <b>Confidentiality</b>, <b>Integrity</b>, and <b>Authenticity</b>.'},
  {ch:'5 · Encryption, Explained', scene:'enctypes', ttl:'Two families: symmetric & asymmetric',
   txt:'Encryption comes in two great families. <b>Symmetric</b> uses one shared key to both lock and unlock — fast, but how do you share the key safely? <b>Asymmetric</b> uses a key <i>pair</i> — a public key anyone can lock with, and a private key only you can unlock with. TLS cleverly uses <b>both</b>.'},
  {ch:'5 · Encryption, Explained', scene:'hashing', ttl:'Hashing — a one-way fingerprint',
   txt:'Not all crypto hides data. <b>Hashing</b> turns any input into a fixed-size <b>fingerprint</b> that can’t be reversed — the same input always gives the same hash, but the tiniest change produces a completely different one. It powers <b>integrity</b> checks, password storage, and certificate signatures.'},
  {ch:'5 · Encryption, Explained', scene:'algos', ttl:'The algorithms you actually use',
   txt:'Here are the workhorses protecting you every day — including the ones from the TLS handshake you just watched. Each fits a specific job: bulk encryption, key exchange, signatures, or fingerprints.'},

  /* ---- BUILD / encapsulation ---- */
  {ch:'6 · Packaging It', scene:'build', sub:0, ttl:'Layer 7 — write the request',
   txt:'The secure tunnel is open. Now we build the actual request to send through it. At the top, your <b>browser</b> writes the HTTP request — the core that everything below will wrap around. (Each handshake message you just saw was wrapped and routed the very same way.)'},
  {ch:'6 · Packaging It', scene:'build', sub:1, ttl:'Layer 6 — lock it up',
   txt:'The <b>TLS</b> layer <b>encrypts</b> the request using the <b>session key</b> agreed during the handshake. From here on, anyone watching the wire sees only scrambled ciphertext.'},
  {ch:'6 · Packaging It', scene:'build', sub:2, ttl:'Layer 5 — remember the conversation',
   txt:'The <b>Session</b> layer keeps track that this is one ongoing exchange between you and Google.'},
  {ch:'6 · Packaging It', scene:'build', sub:3, ttl:'Layer 4 — add ports & reliability (TCP)',
   txt:'<b>TCP</b> wraps it with port numbers (you:51000 → Google:443) and sequence numbers so nothing is lost or out of order. It’s now a <b>Segment</b>.'},
  {ch:'6 · Packaging It', scene:'build', sub:4, ttl:'Layer 3 — add the addresses (IP)',
   txt:'<b>IP</b> stamps the <b>source and destination IP</b> ('+MY_IP+' → '+SERVER_IP+') and a <b>TTL</b> of 64. It’s now a <b>Packet</b> the whole internet can route.'},
  {ch:'6 · Packaging It', scene:'build', sub:5, ttl:'Layer 2 — address the next hop (MAC)',
   txt:'<b>Ethernet/Wi-Fi</b> wraps it in a <b>Frame</b> with MAC addresses — crucially, the destination MAC is your <b>home router</b>, the next hop, not Google.'},
  {ch:'6 · Packaging It', scene:'build', sub:6, ttl:'Layer 1 — become bits',
   txt:'The fully-wrapped frame is turned into <b>raw 1s and 0s</b> — radio waves ready to leave your laptop’s Wi-Fi antenna.'},

  /* ---- A closer look: transport & network ---- */
  {ch:'7 · A Closer Look', scene:'tcpudp', ttl:'Transport layer: TCP <span class="hl">vs</span> UDP',
   txt:'Layer 4 has two main protocols. We used <b>TCP</b> for the web request because every byte must arrive correctly and in order. But for speed-critical traffic, <b>UDP</b> trades guarantees for raw speed — that’s why <b>DNS</b> earlier rode on UDP.'},
  {ch:'7 · A Closer Look', scene:'mtu', ttl:'One message → many small packets',
   txt:'Networks cap how much fits in a single packet — the <b>MTU</b> (Maximum Transmission Unit), typically <b>1500 bytes</b> on Ethernet/Wi-Fi. Bigger data is split: <b>TCP</b> chops it into segments of ≈<b>1460 bytes</b> (the MSS), each tagged with a <b>sequence number</b>. The packets may take different routes and arrive out of order — the receiver uses the sequence numbers to reassemble them perfectly and re-request any that go missing. So the Google page comes back as <b>dozens of small packets</b>, not one big blob.'},
  {ch:'7 · A Closer Look', scene:'ipaddr', ttl:'Network layer: what is an IP address?',
   txt:'Layer 3 delivers by <b>IP address</b>. Let’s break one down — what it is, and what its two parts mean.'},
  {ch:'7 · A Closer Look', scene:'ipversion', ttl:'Two versions: IPv4 and IPv6',
   txt:'The internet is slowly moving from <b>IPv4</b> (we’re running out of addresses) to <b>IPv6</b> (effectively unlimited). Both identify devices — they just differ in size and format.'},
  {ch:'7 · A Closer Look', scene:'iptype', ttl:'Public vs private IP addresses',
   txt:'Not all IPs are equal. Devices in your home share <b>private</b> addresses that can’t travel the internet, hidden behind a single <b>public</b> address. That mismatch is exactly why the next step — <b>NAT</b> — exists.'},

  /* ---- LAN / leave home ---- */
  {ch:'8 · Leaving Home', scene:'lan', sub:0, ttl:'But… what’s the router’s MAC?',
   txt:'The frame needs the router’s hardware (MAC) address. Your computer shouts an <b>ARP</b> broadcast on the local network: <span class="hl">“Who has '+GATEWAY+'?”</span>'},
  {ch:'8 · Leaving Home', scene:'lan', sub:1, ttl:'The router answers',
   txt:'Your <b>home router</b> replies: <span class="hl">“That’s me — my MAC is 5C:F9:38:AB:CD:01.”</span> Now the frame can be addressed to it.'},
  {ch:'8 · Leaving Home', scene:'lan', sub:2, ttl:'Send it over Wi-Fi',
   txt:'The bits travel over <b>Wi-Fi radio</b> a few metres to your router. First hop complete!'},
  {ch:'8 · Leaving Home', scene:'lan', sub:3, ttl:'NAT: borrow a public address',
   txt:'Your laptop’s <b>'+MY_IP+'</b> is a <b>private</b> address that can’t travel the public internet. The router performs <b>NAT</b>: it rewrites the source IP to its own <b>public IP</b> and notes the swap so replies find their way back.'},

  /* ---- How the signal travels: media, bandwidth, cellular ---- */
  {ch:'9 · How the Signal Travels', scene:'fiber', ttl:'Down the fibre — at the speed of light',
   txt:'Across cities and under oceans, your bits travel as <b>pulses of light</b> through hair-thin strands of <b>optical fibre</b>. A laser flashes on and off — light on = 1, off = 0 — and the glass core guides the light by <b>total internal reflection</b>, keeping it trapped even around bends.'},
  {ch:'9 · How the Signal Travels', scene:'bandwidth', ttl:'Bandwidth — the width of the pipe',
   txt:'Why is fibre such a big deal? <b>Bandwidth</b>. Here’s what that word actually means, and why a wider “pipe” carries far more data at once.'},
  {ch:'9 · How the Signal Travels', scene:'cellular', ttl:'Wireless: 2G → 3G → 4G → 5G',
   txt:'Not on Wi-Fi or fibre? Your phone reaches the internet over the <b>cellular</b> network. Each generation roughly multiplied the bandwidth and cut the latency of the one before it.'},

  /* ---- WAN / across the internet ---- */
  {ch:'10 · Across the Internet', scene:'wan', sub:0, ttl:'Out to your ISP',
   txt:'The router forwards the packet to your <b>ISP</b>. The ISP’s router reads only the <b>destination IP</b> ('+SERVER_IP+'), decides the best next hop, and <b>decrements the TTL</b>. It never opens your encrypted data.'},
  {ch:'10 · Across the Internet', scene:'wan', sub:1, ttl:'Onto the backbone',
   txt:'From the ISP, the packet enters the high-capacity <b>internet backbone</b> — long-haul fibre carrying it across cities (and maybe under oceans). Another router, another TTL tick down.'},
  {ch:'10 · Across the Internet', scene:'wan', sub:2, ttl:'Into Google’s network',
   txt:'At a <b>peering point</b>, the packet crosses into <b>Google’s edge network</b>. Google often has servers close to you, so this is usually nearer than you’d think.'},
  {ch:'10 · Across the Internet', scene:'wan', sub:3, ttl:'Arrival at the data center',
   txt:'A final hop delivers the packet to a <b>Google server</b> at '+SERVER_IP+'. It made it across the internet — and the original data inside was <b>never opened</b> by any router on the way.'},

  /* ---- ARRIVAL / reply ---- */
  {ch:'11 · Arrival & Reply', scene:'arrival', sub:0, ttl:'Google unwraps the packet',
   txt:'The server reverses the whole process — <b>de-encapsulation</b>. It peels off each header from the outside in: bits → frame → packet → segment → decrypt → the original request.'},
  {ch:'11 · Arrival & Reply', scene:'arrival', sub:1, ttl:'It reads your request',
   txt:'At the top, Google’s application finally sees the original <b class="mono">'+PAYLOAD+'</b> — byte-for-byte what you sent. It builds the <b>response</b>: the search page.'},
  {ch:'11 · Arrival & Reply', scene:'arrival', sub:2, ttl:'The reply makes the trip back',
   txt:'The response gets wrapped in the same five layers and travels the <b>entire journey in reverse</b> — back through the backbone, your ISP, your router (NAT reverses), and to your laptop.'},

  {ch:'✓ Done', scene:'done', ttl:'google.com is on your screen 🎉',
   txt:'All of that — DNS lookup, five layers of wrapping, the trip across the internet, and the reply — happened in roughly <b>100 milliseconds</b>. Every time you load a page, this entire story plays out.'},
];

/* =====================================================================
   RENDER HELPERS
   ===================================================================== */
function chainHtml(nodes, activeIdx, activeConn, connDir, msg, msgKind){
  let h='<div class="chain">';
  nodes.forEach((nd,i)=>{
    const cls=[ 'node' ];
    if(i===activeIdx) cls.push('active');
    else if(activeIdx>=0 && i>activeIdx && activeConn<0) cls.push('dim');
    const gl=nd.gl?`--gl:${nd.gl}`:'';
    const bub = (i===activeIdx && msg)?`<div class="bubble ${msgKind||''}">${msg}</div>`:'';
    h+=`<div class="${cls.join(' ')}" style="${gl}">
          ${bub}
          <div class="av">${nd.icon}</div>
          <div class="nm">${nd.nm}</div>
          <div class="nsub">${nd.sub||''}</div>
        </div>`;
    if(i<nodes.length-1){
      const on=(i===activeConn);
      h+=`<div class="conn ${on?'active':''} ${connDir==='back'?'back':''}">
            <div class="beam"></div>
          </div>`;
    }
  });
  h+='</div>';
  return h;
}

function ringStack(layers){ // layers: array innermost-control; we pass set of n's
  const ls=[...layers].sort((a,b)=>b-a); // 7 innermost first
  let html=`<div class="core">📄 ${PAYLOAD}</div>`;
  ls.forEach(n=>{
    const L=LYR[n], c=colorN(n);
    html=`<div class="ring" style="border-color:${c}">
            <div class="tab" style="background:${c}">L${n} ${L.name} · ${L.tag}</div>${html}
          </div>`;
  });
  return html;
}
function sideCard(n){
  const L=LYR[n], c=colorN(n);
  return `<div class="sidecard">
    <h4 style="color:${c}">Layer ${n} · ${L.name} <span style="color:var(--muted);font-weight:400;font-size:12px">(${L.tag})</span></h4>
    <div class="pdu">Unit becomes: <b>${L.pdu}</b></div>
    ${L.fields.map(f=>`<div class="frow"><span class="k">${f[0]}</span><span class="v mono">${f[1]}</span></div>`).join('')}
    <div class="why">${L.why}</div>
  </div>`;
}

function rDns(sub){
  const nodes=[
    {icon:'💻',nm:'Your computer',sub:MY_IP,gl:'#74b9ffaa'},
    {icon:'🧭',nm:'Resolver',sub:'8.8.8.8',gl:'#4c6ef5aa'},
    {icon:'🌍',nm:'Root server',sub:'“.”',gl:'#fdcb6eaa'},
    {icon:'🏷️',nm:'.com TLD',sub:'top-level',gl:'#e17055aa'},
    {icon:'🔷',nm:'Google NS',sub:'authoritative',gl:'#0984e3aa'},
  ];
  let active=-1, conn=-1, dir='fwd', msg='', kind='';
  let extra='';
  if(sub===0){active=0;}

function laneHtml(dir,label,detail){
  return `<div class="lane">

}
function transcriptHtml(items,cur){
  return `<div class="transcript">`+items.map((m,i)=>`
    <div class="trow ${i===cur?'cur':''} ${i>cur?'future':''}">
      <span class="dir">${m.dir==='cs'?'➡':'⬅'}</span><span>${m.label}</span>
    </div>`).join('')+`</div>`;
}
function tlsStepper(active){
  const steps=['ClientHello','ServerHello + key share','Shared secret (Diffie–Hellman)','Derive session keys','Verify certificate','Finished → 🔒 secure'];
  return `<div class="stepper">`+steps.map((s,i)=>`
    <div class="st ${i===active?'cur':''} ${i<active?'done':''}">
      <span class="stn">${i<active?'✓':i+1}</span><span>${s}</span>
    </div>`).join('')+`</div>`;
}

}

    {g:'4G / LTE', yr:'~2009', color:'#00b894', speed:'~10–100+ Mbps', bar:55, use:'HD streaming, apps, maps'},
    {g:'5G', yr:'~2019', color:'#e84393', speed:'~0.1–10 Gbps',   bar:100, use:'Ultra-fast, <10 ms latency, billions of IoT devices'},
  ];
  return `<div class="art"><div class="gens">`+gens.map(x=>`
    <div class="gen" style="border-top-color:${x.color}">
      <div class="gg" style="color:${x.color}">${x.g}</div>
      <div class="gy">${x.yr}</div>
      <div class="gbarwrap"><div class="gbar" style="width:${x.bar}%;background:${x.color}"></div></div>
      <div class="gs">${x.speed}</div>
      <div class="gu">${x.use}</div>
    </div>`).join('')+`</div>
    <div style="max-width:700px;text-align:center;color:var(--muted);font-size:13px;margin-top:8px;line-height:1.6">Each cellular generation brought roughly <b style="color:#fff">10–100× the bandwidth</b> of the last and <b>lower latency</b> — from text messages (2G) to real-time everything (5G). This is the <b>wireless</b> path your data takes when you’re not on Wi-Fi.</div>
  </div>`;
}

/* ----- encryption, explained ----- */
function rEncWhy(){
  return `<div class="art" style="gap:22px">
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center">
      <div class="plainbox">🔓 “password: hunter2”<small>plaintext — anyone on the wire can read it</small></div>
      <div style="font-size:26px">🔒→</div>
      <div class="cipherbox mono">x9$@kL7#qZ…<small>encrypted — gibberish to an eavesdropper</small></div>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:780px">
      ${infoCard('🙈','Confidentiality','Only the intended reader can understand the data.')}
      ${infoCard('🛡️','Integrity','Any tampering in transit is detected.')}
      ${infoCard('🪪','Authenticity','You can prove who you’re really talking to.')}
    </div>
  </div>`;
}
function rEncTypes(){
  return `<div class="art" style="gap:18px">
    ${compareHtml(
      {color:'#00b894',icon:'🔑',title:'Symmetric',sub:'one shared key',
       rows:[['🔑','The same key both encrypts and decrypts'],['⚡','Very fast — ideal for bulk data'],['⚠️','Challenge: how to share the key safely? → Diffie–Hellman'],['🔧','e.g. AES, ChaCha20']],
       foot:'TLS uses this for all your actual data, once a key is agreed.'},
      {color:'#0984e3',icon:'🗝️',title:'Asymmetric',sub:'a public + private key pair',
       rows:[['🔓','Public key (shared) locks → only the private key unlocks'],['✍️','Private key signs → anyone verifies with the public key'],['🐢','Slower — used for setup, not bulk data'],['🔧','e.g. RSA, ECC']],
       foot:'TLS uses this to verify the certificate and set up the session.'}
    )}
    <div class="hybridnote">🤝 Real systems are <b>hybrid</b>: asymmetric crypto safely agrees a key, then fast <b>symmetric</b> (AES) protects the data — exactly what the TLS handshake did.</div>
  </div>`;
}
function rHashing(){
  return `<div class="art" style="gap:18px">
    <div class="hashdemo">
      <div class="hrow"><span class="hin mono">"hello"</span><span>→</span><span class="hfn">SHA-256</span><span>→</span><span class="hout mono">2cf24dba5fb0a3…9824</span></div>
      <div class="hrow"><span class="hin mono">"hellp"</span><span>→</span><span class="hfn">SHA-256</span><span>→</span><span class="hout mono">7f83b1657ff1fc…b8e2</span></div>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:780px">
      ${infoCard('➡️','One-way','You can’t reverse a hash back into the original input.')}
      ${infoCard('📏','Fixed size','Any input — a word or a movie — yields the same-length fingerprint.')}
      ${infoCard('🌊','Avalanche','Change one letter and the entire hash changes completely.')}
      ${infoCard('🔐','HMAC','Add a secret key to a hash to prove integrity AND authenticity.')}
    </div>
  </div>`;
}
function rAlgos(){
  const algos=[
    {n:'AES',          type:'Symmetric',    color:'#00b894', size:'128 / 256-bit key', use:'The workhorse for bulk data: TLS, disk & Wi-Fi (WPA) encryption. Fast, hardware-accelerated.'},
    {n:'RSA',          type:'Asymmetric',   color:'#0984e3', size:'2048 / 4096-bit',   use:'Classic public-key crypto for key exchange & digital signatures / certificates. Based on factoring huge numbers.'},
    {n:'ECC',          type:'Asymmetric',   color:'#a29bfe', size:'256-bit ≈ RSA-3072',use:'Elliptic curves: same security as RSA with far smaller keys → faster & mobile-friendly. The modern TLS default (ECDHE/ECDSA).'},
    {n:'Diffie–Hellman',type:'Key exchange',color:'#fdcb6e', size:'—',                 use:'Agrees a shared secret over a public channel without ever sending it — you watched this in the handshake.'},
    {n:'SHA-256',      type:'Hashing',      color:'#e84393', size:'256-bit digest',    use:'One-way fingerprints for integrity checks, certificates, password storage and blockchains.'},
  ];
  return `<div class="art"><div class="algogrid">`+algos.map(a=>`
    <div class="algocard" style="border-left-color:${a.color}">
      <div class="an" style="color:${a.color}">${a.n}</div>
      <div class="at" style="background:${a.color}">${a.type}</div>
      <div class="asz mono">${a.size}</div>
      <div class="au">${a.use}</div>
    </div>`).join('')+`</div></div>`;
}

const RENDER={ title:rTitle, dns:rDns, tcp:rTcp, tls:rTls,
               encwhy:rEncWhy, enctypes:rEncTypes, hashing:rHashing, algos:rAlgos,
               build:rBuild, tcpudp:rTcpUdp, mtu:rMtu, ipaddr:rIpAddr, ipversion:rIpVersion, iptype:rIpType,
               fiber:rFiber, bandwidth:rBandwidth, cellular:rCellular,
               lan:rLan, wan:rWan, arrival:rArrival, done:rDone };

/* =====================================================================
   ENGINE
   ===================================================================== */
let idx=0, autoTimer=null;
const sceneEl=document.getElementById('scene');
const chapters=[...new Set(BEATS.map(b=>b.ch))];

function buildSegs(){
  const segs=document.getElementById('segs'); segs.innerHTML='';
  chapters.forEach(()=>{ segs.innerHTML+='<div class="seg"><div class="fill"></div></div>'; });
}
function render(){
  const b=BEATS[idx];
  const fn=RENDER[b.scene];
  const art=fn(b.sub);
  sceneEl.innerHTML = art + `<div class="narr">
      <h2 class="ttl">${b.ttl}</h2><p class="txt">${b.txt}</p></div>`;
  // top bar
  document.getElementById('chapterChip').textContent='Chapter '+b.ch;
  document.getElementById('count').textContent=(idx+1)+' / '+BEATS.length;
  const curCh=chapters.indexOf(b.ch);
  document.querySelectorAll('.seg').forEach((s,i)=>{
    s.classList.toggle('done', i<curCh);
    s.classList.toggle('cur', i===curCh);
  });
  document.getElementById('back').disabled = idx===0;
  document.getElementById('next').disabled = idx===BEATS.length-1;
  document.getElementById('next').textContent = idx===BEATS.length-1 ? 'The End' : 'Next →';
}
function next(){ if(idx<BEATS.length-1){ idx++; render(); } else stopAuto(); }
function back(){ if(idx>0){ idx--; render(); } }
function restart(){ idx=0; render(); }

function startAuto(){ stopAuto(); autoTimer=setInterval(()=>{ if(idx<BEATS.length-1) next(); else stopAuto(); }, 4200); }
function stopAuto(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; } document.getElementById('auto').checked=false; }

document.getElementById('next').onclick=()=>{stopAuto();next();};
document.getElementById('back').onclick=()=>{stopAuto();back();};
document.getElementById('restart').onclick=()=>{stopAuto();restart();};
document.getElementById('auto').onchange=e=>{ e.target.checked?startAuto():stopAuto(); };
document.addEventListener('keydown',e=>{
  if(document.body.classList.contains('on-home')){
    if(e.code==='Enter'){ e.preventDefault(); enterStory(0); }
    return;
  }
  if(e.code==='ArrowRight'||e.code==='Space'){e.preventDefault();stopAuto();next();}
  else if(e.code==='ArrowLeft'){stopAuto();back();}
  else if(e.key.toLowerCase()==='r'){stopAuto();restart();}
  else if(e.key.toLowerCase()==='h'){stopAuto();showHome();}
});

/* ----- home / landing screen ----- */
const CHMETA={
  '1 · The Click':            {icon:'🖱️', color:'#4c6ef5', blurb:'You type google.com and hit Enter — the journey begins.'},
  '2 · Finding Google':       {icon:'🔎', color:'#0984e3', blurb:'DNS turns the name into an IP through a chain of servers.'},
  '3 · The Connection':       {icon:'🤝', color:'#00b894', blurb:'TCP’s 3-way handshake opens a reliable channel.'},
  '4 · The Secret Handshake': {icon:'🔐', color:'#6c5ce7', blurb:'TLS agrees a shared secret — Diffie–Hellman & certificates.'},
  '5 · Encryption, Explained':{icon:'🧩', color:'#a29bfe', blurb:'Why we encrypt; symmetric vs asymmetric, hashing & key algorithms.'},
  '6 · Packaging It':         {icon:'📦', color:'#e84393', blurb:'Wrap the request layer by layer — the OSI encapsulation onion.'},
  '7 · A Closer Look':        {icon:'🔬', color:'#e17055', blurb:'TCP vs UDP, MTU & packets, IP addresses, IPv4/6, public vs private.'},
  '8 · Leaving Home':         {icon:'🏠', color:'#fdcb6e', blurb:'ARP finds the router, a Wi-Fi hop, then NAT rewrites your address.'},
  '9 · How the Signal Travels':{icon:'💡',color:'#74b9ff', blurb:'Optical fibre & light pulses, bandwidth, and 2G → 5G.'},
  '10 · Across the Internet':  {icon:'🌐', color:'#00cec9', blurb:'Router hops to Google’s data center, TTL ticking down.'},
  '11 · Arrival & Reply':      {icon:'📨', color:'#55efc4', blurb:'Google unwraps, builds the page, and the reply comes back.'},
  '✓ Done':                    {icon:'✅', color:'#00b894', blurb:'The recap — all of it in roughly 100 milliseconds.'},
};
function chapterIndex(){
  const map={};
  BEATS.forEach((b,i)=>{ if(!(b.ch in map)) map[b.ch]={first:i,count:0}; map[b.ch].count++; });
  return map;
}
function buildHome(){
  const grid=document.getElementById('homeGrid');
  const info=chapterIndex();
  grid.innerHTML = chapters.map(ch=>{
    const m=CHMETA[ch]||{icon:'•',color:'#4c6ef5',blurb:''};
    const meta=info[ch];
    const parts=ch.split(' · ');
    const num=parts[0], title=parts.slice(1).join(' · ')||ch;
    return `<div class="homecard" style="border-top-color:${m.color}" data-i="${meta.first}">
       <div class="hc-top"><span class="hc-num" style="background:${m.color}">${num}</span><span class="hc-ic">${m.icon}</span></div>
       <div class="hc-title">${title}</div>
       <div class="hc-blurb">${m.blurb}</div>
       <div class="hc-steps">${meta.count} step${meta.count>1?'s':''} →</div>
     </div>`;
  }).join('');
  grid.querySelectorAll('.homecard').forEach(c=> c.onclick=()=> enterStory(+c.dataset.i));
  document.getElementById('homeFoot').textContent =
    `${chapters.length} chapters · ${BEATS.length} steps · pick any chapter to jump in`;
}
function showHome(){ stopAuto(); document.body.classList.add('on-home'); }
function enterStory(i){ document.body.classList.remove('on-home'); idx=i; render(); document.getElementById('stage').scrollTop=0; }

document.getElementById('startBtn').onclick=()=>enterStory(0);
document.getElementById('homeBtn').onclick=()=>showHome();

buildSegs();
buildHome();
showHome();
</script>
</body>
